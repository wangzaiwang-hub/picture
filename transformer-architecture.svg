<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#213547"/>
    </marker>
    <style>
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#24313f}
      .label{font:600 21px "Microsoft YaHei",Arial,sans-serif;fill:#24313f}
      .small{font:500 16px "Microsoft YaHei",Arial,sans-serif;fill:#34495e}
      .tiny{font:500 14px "Microsoft YaHei",Arial,sans-serif;fill:#34495e}
      .box{rx:14;stroke:#24313f;stroke-width:3}
      .sub{rx:10;stroke:#24313f;stroke-width:2}
      .arrow{stroke:#213547;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke-dasharray:10 8}
    </style>
  </defs>

  <rect width="1200" height="760" fill="#fbfcfe"/>
  <text class="title" x="350" y="58">Transformer 架构流程图</text>

  <rect class="box" x="170" y="135" width="330" height="500" fill="#e8f6f3"/>
  <text class="label" x="290" y="172">编码器 Encoder</text>
  <text class="tiny" x="445" y="262">N x</text>

  <rect class="sub" x="220" y="510" width="230" height="62" fill="#d7c4f2"/>
  <text class="small" x="278" y="546">输入嵌入</text>
  <rect class="sub" x="220" y="425" width="230" height="62" fill="#fdebd0"/>
  <text class="small" x="256" y="461">位置编码相加</text>
  <rect class="sub" x="220" y="315" width="230" height="72" fill="#eaf2c2"/>
  <text class="small" x="256" y="344">多头自注意力</text>
  <text class="tiny" x="288" y="367">Multi-Head Attention</text>
  <rect class="sub" x="220" y="220" width="230" height="62" fill="#c7ecee"/>
  <text class="small" x="277" y="256">前馈网络</text>
  <rect class="sub" x="220" y="120" width="230" height="62" fill="#dff2d8"/>
  <text class="small" x="270" y="156">残差 + 归一化</text>

  <rect class="box" x="705" y="135" width="330" height="500" fill="#edf7e8"/>
  <text class="label" x="818" y="172">解码器 Decoder</text>
  <text class="tiny" x="980" y="262">N x</text>

  <rect class="sub" x="755" y="510" width="230" height="62" fill="#d7c4f2"/>
  <text class="small" x="812" y="546">输出嵌入</text>
  <rect class="sub" x="755" y="425" width="230" height="62" fill="#fdebd0"/>
  <text class="small" x="791" y="461">位置编码相加</text>
  <rect class="sub" x="755" y="330" width="230" height="68" fill="#eaf2c2"/>
  <text class="small" x="785" y="358">带掩码多头注意力</text>
  <text class="tiny" x="821" y="381">Masked MHA</text>
  <rect class="sub" x="755" y="240" width="230" height="68" fill="#eaf2c2"/>
  <text class="small" x="794" y="268">交叉注意力</text>
  <text class="tiny" x="798" y="291">关注编码器输出</text>
  <rect class="sub" x="755" y="150" width="230" height="62" fill="#c7ecee"/>
  <text class="small" x="812" y="186">前馈网络</text>

  <rect class="sub" x="755" y="70" width="230" height="52" fill="#dff2d8"/>
  <text class="small" x="805" y="103">残差 + 归一化</text>
  <rect class="sub" x="785" y="655" width="170" height="58" fill="#f7d8bd"/>
  <text class="small" x="812" y="690">Linear + Softmax</text>

  <path class="arrow" d="M335 705 L335 580"/>
  <path class="arrow" d="M335 510 L335 490"/>
  <path class="arrow" d="M335 425 L335 390"/>
  <path class="arrow" d="M335 315 L335 285"/>
  <path class="arrow" d="M335 220 L335 185"/>
  <path class="arrow" d="M870 705 L870 655"/>
  <path class="arrow" d="M870 655 L870 580"/>
  <path class="arrow" d="M870 510 L870 490"/>
  <path class="arrow" d="M870 425 L870 400"/>
  <path class="arrow" d="M870 330 L870 310"/>
  <path class="arrow" d="M870 240 L870 215"/>
  <path class="arrow dash" d="M450 350 C570 345,620 275,755 275"/>
  <text class="small" x="515" y="310" fill="#0b6b76">编码器输出作为 Key/Value</text>

  <rect x="70" y="680" width="210" height="44" rx="12" fill="#eef3ff" stroke="#6c7ae0" stroke-width="2"/>
  <text class="small" x="96" y="708">源序列：我 爱 学习</text>
  <rect x="980" y="680" width="170" height="44" rx="12" fill="#fff1e8" stroke="#e67e22" stroke-width="2"/>
  <text class="small" x="1006" y="708">目标序列右移</text>
  <path class="arrow" d="M280 700 L330 700"/>
  <path class="arrow" d="M980 700 L925 700"/>

  <text class="small" x="84" y="92" fill="#c0392b">核心记忆：Attention 负责“看哪里”，FFN 负责“加工信息”。</text>
  <text class="small" x="760" y="92" fill="#7d3c98">解码器比编码器多一步：看已经生成的词，并看编码器结果。</text>
</svg>
