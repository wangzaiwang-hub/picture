<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620">
  <defs>
    <style>
      text{font-family:"Microsoft YaHei","SimHei",Arial,sans-serif;fill:#10213f}
      .title{font-size:30px;font-weight:800}
      .sub{font-size:15px;fill:#697896}
      .box{fill:#fff;stroke:#d9e3f2;stroke-width:2;rx:16}
      .label{font-size:18px;font-weight:800}
      .small{font-size:14px;fill:#536480}
      .line{stroke:#8aa0c8;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8aa0c8"/>
    </marker>
  </defs>
  <rect width="1280" height="620" fill="#f4f7fc"/>
  <text x="48" y="54" class="title">实时视觉检测流水线</text>
  <text x="48" y="84" class="sub">单摄像头输入，按页面模式选择一个检测任务，输出锚框、锚点、状态与事件</text>
  <g transform="translate(56,150)">
    <rect width="160" height="110" class="box"/><text x="34" y="44" class="label">摄像头帧</text><text x="28" y="74" class="small">OpenCV / WebRTC</text>
  </g>
  <path d="M216 205 L285 205" class="line"/>
  <g transform="translate(286,150)">
    <rect width="178" height="110" class="box"/><text x="34" y="44" class="label">帧预处理</text><text x="28" y="74" class="small">尺寸、颜色、Base64</text>
  </g>
  <path d="M464 205 L535 205" class="line"/>
  <g transform="translate(536,150)">
    <rect width="190" height="110" class="box"/><text x="35" y="44" class="label">模式路由</text><text x="28" y="74" class="small">fall / emotion / face</text>
  </g>
  <path d="M726 205 L795 205" class="line"/>
  <g transform="translate(796,100)">
    <rect width="410" height="210" class="box"/>
    <text x="30" y="44" class="label">YOLO + 特征识别</text>
    <text x="30" y="82" class="small">跌倒：目标框 + 姿态骨架，绿色未跌倒，红色跌倒</text>
    <text x="30" y="116" class="small">心情：happy/sad 超 0.60，否则正常</text>
    <text x="30" y="150" class="small">人物：人脸检测 + 数据库/Archive 特征匹配</text>
    <text x="30" y="184" class="small">闯入：陌生人超过阈值才触发</text>
  </g>
  <path d="M1000 310 L1000 370" class="line"/>
  <g transform="translate(796,370)">
    <rect width="410" height="115" class="box"/>
    <text x="30" y="44" class="label">阈值与事件门控</text>
    <text x="30" y="76" class="small">45 秒冷却、离开再进入、置信度过滤，避免逐帧重复入库</text>
  </g>
  <path d="M796 430 L650 430" class="line"/>
  <g transform="translate(438,370)">
    <rect width="210" height="115" class="box"/>
    <text x="34" y="44" class="label">结果回传</text>
    <text x="30" y="76" class="small">原始画面 + 识别画面</text>
  </g>
  <path d="M536 485 L536 540" class="line"/>
  <text x="435" y="575" class="sub">前端实时刷新当前状态，满足标准的事件写入 MySQL，并进入数据大屏统计</text>
</svg>
