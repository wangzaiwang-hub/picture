    <text x="0" y="75" class="small">smile</text><rect x="100" y="57" width="400" height="18" rx="9" fill="#eef3fb"/><rect x="100" y="57" width="230" height="18" rx="9" fill="#24c487"/><text x="512" y="73" class="small">92</text>
    <text x="0" y="122" class="small">face</text><rect x="100" y="104" width="400" height="18" rx="9" fill="#eef3fb"/><rect x="100" y="104" width="138" height="18" rx="9" fill="#4f6ef7"/><text x="512" y="120" class="small">55</text>
    <text x="0" y="169" class="small">emotion</text><rect x="100" y="151" width="400" height="18" rx="9" fill="#eef3fb"/><rect x="100" y="151" width="113" height="18" rx="9" fill="#f5a230"/><text x="512" y="167" class="small">45</text>
