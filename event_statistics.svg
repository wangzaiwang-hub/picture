<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      text{font-family:"Microsoft YaHei","SimHei",Arial,sans-serif;fill:#10213f}
      .title{font-size:30px;font-weight:800}.sub{font-size:15px;fill:#697896}
      .card{fill:#fff;stroke:#d9e3f2;stroke-width:2;rx:18}
      .h{font-size:20px;font-weight:800}.small{font-size:14px;fill:#5c6c88}.num{font-size:28px;font-weight:800}
      .grid{stroke:#dfe7f2;stroke-width:1}.axis{stroke:#9aa8bd;stroke-width:2}
